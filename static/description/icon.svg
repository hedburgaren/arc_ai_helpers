<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ai-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#ai-g)"/>
  <!-- Antenna -->
  <line x1="50" y1="30" x2="50" y2="18"
        stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="50" cy="14" r="5" fill="white"/>
  <!-- Robot head (rounded rectangle) -->
  <rect x="23" y="30" width="54" height="38" rx="9"
        fill="none" stroke="white" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Eyes (glowing squares) -->
  <rect x="32" y="40" width="13" height="11" rx="3" fill="white"/>
  <rect x="55" y="40" width="13" height="11" rx="3" fill="white"/>
  <!-- Smile -->
  <path d="M36 59 Q50 67 64 59"
        fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Ear bolts -->
  <circle cx="19" cy="47" r="4.5" fill="white"/>
  <circle cx="81" cy="47" r="4.5" fill="white"/>
  <!-- Body -->
  <rect x="32" y="70" width="36" height="17" rx="6"
        fill="none" stroke="white" stroke-width="4.5" stroke-linejoin="round"/>
</svg>
